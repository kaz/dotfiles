- name: install vscode extensions
  vscode_extension:
    code_path: "/Applications/Cursor.app/Contents/Resources/app/bin/code"
    name: "{{ item }}"
  loop:
    - anthropic.claude-code
    - bradlc.vscode-tailwindcss
    - bufbuild.vscode-buf
    - docker.docker
    - esbenp.prettier-vscode
    - golang.go
    - hashicorp.terraform
    - openai.chatgpt
    - oxc.oxc-vscode
    - redhat.vscode-yaml
    - unifiedjs.vscode-mdx
    - vue.volar
